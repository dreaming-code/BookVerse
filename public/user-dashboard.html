<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookVerse Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:
      radial-gradient(circle at top left,#0c111d,#151a29,#0d0f1a);
      color:white;
      min-height:100vh;
      padding:30px;
    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    /* NAVBAR */

    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:35px;
      background:rgba(20,25,40,0.8);
      border:1px solid rgba(100,150,255,0.15);
      border-radius:20px;
      padding:20px 25px;
      backdrop-filter:blur(12px);
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .logo{
      font-size:30px;
      font-weight:700;
      background:linear-gradient(to right,#00C8FF,#8b5cf6,#ec4899);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .nav-buttons{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      padding:12px 22px;
      border-radius:14px;
      color:white;
      font-size:15px;
      font-weight:600;
      transition:0.3s ease;
    }

    .btn:hover{
      transform:translateY(-3px);
    }

    .primary-btn{
      background:linear-gradient(135deg,#8b5cf6,#ec4899);
      box-shadow:0 8px 25px rgba(139,92,246,0.35);
    }

    .secondary-btn{
      background:#1d2435;
      border:1px solid #313a52;
    }

    .secondary-btn:hover{
      background:#252e42;
    }

    .danger{
      background:linear-gradient(135deg,#ef4444,#b91c1c);
      box-shadow:0 8px 25px rgba(239,68,68,0.25);
    }

    .success{
      background:linear-gradient(135deg,#00C8FF,#3757e7);
      box-shadow:0 8px 25px rgba(0,200,255,0.25);
    }

    /* PROFILE */

    .profile-card{
      background:linear-gradient(145deg,#171c2b,#121826);
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(100,150,255,0.15);
      box-shadow:0 15px 40px rgba(0,0,0,0.5);
      margin-bottom:35px;
    }

    .banner{
      height:250px;
      background:
      linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.6)),
      url('https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1400');
      background-size:cover;
      background-position:center;
    }

    .profile-content{
      padding:30px;
      margin-top:-90px;
      position:relative;
    }

    .profile-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      flex-wrap:wrap;
      gap:20px;
    }

    .profile-left{
      display:flex;
      align-items:flex-end;
      gap:25px;
      flex-wrap:wrap;
    }

    .profile-image{
      width:170px;
      height:170px;
      object-fit:cover;
      border-radius:50%;
      border:6px solid #0f1117;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    .user-details h1{
      font-size:38px;
      margin-bottom:8px;
    }

    .username{
      color:#00C8FF;
      margin-bottom:10px;
      font-size:15px;
    }

    .bio{
      color:#a4afc3;
      max-width:550px;
      line-height:1.7;
    }

    /* STATS */

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:20px;
      margin-top:40px;
    }

    .stat-card{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(100,150,255,0.15);
      border-radius:22px;
      padding:24px;
      transition:0.3s ease;
    }

    .stat-card:hover{
      transform:translateY(-5px);
      background:rgba(255,255,255,0.05);
    }

    .stat-title{
      color:#9ca3af;
      font-size:14px;
      margin-bottom:10px;
    }

    .stat-value{
      font-size:26px;
      font-weight:700;
    }

    /* DASHBOARD GRID */

    .dashboard-grid{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:25px;
      margin-top:30px;
    }

    .card{
      background:rgba(20,25,40,0.92);
      border-radius:24px;
      border:1px solid rgba(100,150,255,0.15);
      padding:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .card h2{
      font-size:26px;
      margin-bottom:25px;
      color:#00C8FF;
    }

    /* BOOK GRID */

    .book-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
      gap:25px;
    }

    .book-card{
      background:#161d2c;
      border-radius:22px;
      overflow:hidden;
      border:1px solid rgba(100,150,255,0.15);
      transition:0.35s ease;
      animation:fadeUp 0.4s ease;
    }

    .book-card:hover{
      transform:translateY(-8px) scale(1.02);
      box-shadow:0 20px 35px rgba(0,0,0,0.5);
    }

    .book-image{
      width:100%;
      height:320px;
      object-fit:cover;
    }

    .book-content{
      padding:18px;
    }

    .book-title{
      font-size:20px;
      font-weight:600;
      margin-bottom:8px;
    }

    .book-author{
      color:#9ca3af;
      margin-bottom:12px;
    }

    .status{
      display:inline-block;
      background:rgba(139,92,246,0.15);
      color:#c084fc;
      padding:8px 14px;
      border-radius:30px;
      font-size:13px;
      margin-bottom:12px;
    }
    a{
      cursor: pointer;
      text-decoration: none;
    }
    /* LIST BOOKS */

    .book-item{
      display:flex;
      align-items:center;
      gap:15px;
      background:rgba(255,255,255,0.03);
      padding:16px;
      border-radius:16px;
      margin-bottom:14px;
      transition:0.3s ease;
    }

    .book-item:hover{
      background:rgba(255,255,255,0.06);
    }

    .book-info{
      flex:1;
    }

    /* EMPTY */

    .empty-msg{
      text-align:center;
      color:#7b8191;
      padding:40px;
      border:1px dashed #374151;
      border-radius:16px;
      background:rgba(255,255,255,0.02);
      margin-top:15px;
    }

    /* MODAL */

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:1000;
      padding:20px;
      backdrop-filter:blur(6px);
    }

    .modal.active{
      display:flex;
    }

    .modal-content{
      width:100%;
      max-width:550px;
      max-height:90vh;
      overflow-y:auto;
      background:linear-gradient(135deg,#1c2336,#111827);
      border-radius:28px;
      border:1px solid rgba(100,150,255,0.15);
      padding:30px;
      animation:popup 0.3s ease;
      box-shadow:0 20px 40px rgba(0,0,0,0.5);
    }

    .modal-content h2{
      margin-bottom:25px;
      color:#00C8FF;
      text-align:center;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      color:#d1d5db;
    }

    .form-group input,
    .form-group textarea{
      width:100%;
      border:none;
      outline:none;
      background:#0f172a;
      border:1px solid #293246;
      border-radius:14px;
      padding:15px;
      color:white;
      font-size:15px;
      transition:0.3s ease;
    }

    .form-group textarea{
      resize:vertical;
      min-height:100px;
    }

    .form-group input:focus,
    .form-group textarea:focus{
      border-color:#00C8FF;
      box-shadow:0 0 0 4px rgba(0,200,255,0.15);
    }

    .modal-buttons{
      display:flex;
      justify-content:flex-end;
      gap:12px;
      margin-top:25px;
    }
.icon-btn {
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
}

.icon-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.icon-btn svg { width: 45px; height: 45px; } 
    /* Custom scrollbar for modal */
    .modal-content::-webkit-scrollbar {
      width: 8px;
    }
    
    /* PENDING BOOKS */

    .pending-book-card{
      display:flex;
      gap:18px;
      background:#1b2233;
      border:1px solid #313c54;
      border-radius:18px;
      padding:18px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .pending-book-card img{
      width:120px;
      height:160px;
      object-fit:cover;
      border-radius:12px;
    }
    
    .profile-image-wrapper{
  position:relative;
  cursor:pointer;
}

[contenteditable="true"]{
  outline:2px solid #00C8FF;
  padding:4px 8px;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
}

    .pending-book-info{
      flex:1;
    }

    .pending-book-info h3{
      margin-bottom:10px;
    }

    .pending-book-actions{
      display:flex;
      gap:12px;
      margin-top:15px;
      flex-wrap:wrap;
    }

    /* ANIMATION */

    @keyframes popup{

      from{
        transform:scale(0.85);
        opacity:0;
      }

      to{
        transform:scale(1);
        opacity:1;
      }
    }

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* RESPONSIVE */

    @media(max-width:1000px){

      .dashboard-grid{
        grid-template-columns:1fr;
      }
    }

    @media(max-width:768px){

      body{
        padding:15px;
      }

      .navbar{
        flex-direction:column;
        gap:20px;
      }

      .profile-left{
        flex-direction:column;
        align-items:flex-start;
      }

      .profile-image{
        width:140px;
        height:140px;
      }

      .user-details h1{
        font-size:28px;
      }

      .book-grid{
        grid-template-columns:1fr;
      }
    }

  </style>
</head>
<body>

<div class="container">

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">
      <a href="library.html">BookVerse</a>
    </div>

    <div class="nav-buttons">

      <button class="btn secondary-btn"  onclick="toggleEditProfile()">
        Edit Profile
      </button>

      <button class="btn primary-btn" onclick="openModal()">
        + Add New Book
      </button>

      <button class="btn danger" onclick="logout()">
        Logout
      </button>
      
      <button class="icon-btn" id="btnLogout" title="Back to Library" onclick="window.location.href='library.html#map'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </button>
    </div>

  </div>

  <!-- PROFILE -->

  <div class="profile-card">

    <div class="banner"></div>

    <div class="profile-content">

      <div class="profile-top">

        <div class="profile-left">

          <div class="profile-image-wrapper">

  <img
    id="profileImage"
    class="profile-image"
    src="https://tse4.mm.bing.net/th/id/OIP.sJkniyO6ABZFZ8cGsR-gMQHaE8?rs=1&pid=ImgDetMain&o=7&rm=3"
  />

  <input
    type="file"
    id="imageUpload"
    accept="image/*"
    hidden
  />

</div>
           
          <div class="user-details">

            <h1 id="name"  contenteditable="false">
              Arjun Sharma
            </h1>

            <div class="username" id="userName"  contenteditable="false">
              @arjun_reads
            </div>

            <div class="bio" id="profileBio"  contenteditable="false">
              Write something about yourself
            </div>

          </div>

        </div>

      </div>

      <!-- STATS -->

      <div class="stats">

        <div class="stat-card">
          <div class="stat-title">Books Added</div>
          <div class="stat-value" id="bookCount">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-title" >Currently Reading</div>
          <div class="stat-value" id="currentlyReadingCount">0</div>
        </div>

        <div class="stat-card">
          <div class="stat-title">Favourite Genre</div>
          <div class="stat-value" contenteditable="false" id="favGenre">Fiction</div>
        </div>

        <div class="stat-card">
          <div class="stat-title">Member Since</div>
          <div class="stat-value">2026</div>
        </div>

        <div class="stat-card">
          <div class="stat-title">Role</div>
          <div class="stat-value">User</div>
        </div>

      </div>

    </div>

  </div>

  <!-- DASHBOARD GRID -->

    <div>


      <!-- MY ADDED BOOKS -->

      <div class="card" style="margin-top:25px;">

        <h2>
          📝 My Added Books
        </h2>

        <div class="book-grid" id="bookGrid"></div>

      </div>

    </div>
  </div>

</div>

<!-- MODAL -->

<div id="addBookModal" class="modal">

  <div class="modal-content">

    <h2>
      📝 Add New Book
    </h2>

    <form id="addBookForm">

      <div class="form-group">
        <label>Title *</label>
        <input type="text" name="title" placeholder="Book title" required>
      </div>

      <div class="form-group">
        <label>Author *</label>
        <input type="text" name="author" placeholder="Author name" required>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea name="description" placeholder="Brief description of the book"></textarea>
      </div>

      <div class="form-group">
        <label>Genre</label>
        <input type="text" name="genre" placeholder="Fiction, Horror, Romance...">
      </div>

      <div class="form-group">
        <label>Cover URL</label>
        <input type="url" name="coverUrl" placeholder="Paste image URL">
      </div>

      <div class="form-group">
        <label>File URL *</label>
        <input type="url" name="fileUrl" placeholder="Paste PDF or book link" required>
      </div>

    </form>

    <div class="modal-buttons">

      <button class="btn success" onclick="submitBook()">
        Add Book
      </button>

      <button class="btn danger" onclick="closeAddBookForm()">
        Cancel
      </button>

    </div>

  </div>

</div>

<script src="script2.js"></script>

</body>
</html>
