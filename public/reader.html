<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reader</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#0b1220; color:#e2e8f0; }
    .wrap { max-width: 960px; margin: 24px auto; padding: 16px; }
    .bar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    a { color:#38bdf8; text-decoration:none; }
    .panel { background:#111827; border-radius:12px; padding:16px; margin-top:16px; }
    .title { font-size: 24px; margin:0 0 8px 0; }
    .meta { color:#93c5fd; margin:0 0 16px 0; }
    .controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    input[type="range"] { width: 320px; }
    button { border:none; border-radius:8px; padding:10px 14px; cursor:pointer; font-weight:600; }
    .primary { background:#0284c7; color:white; }
    .secondary { background:#374151; color:white; }
    iframe { width:100%; height:70vh; border:none; border-radius:8px; background:#0f172a; margin-top:16px; }
    .status { margin-top:10px; color:#86efac; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <a href="library.html">← Back to Library</a>
      <span id="lastSaved"></span>
    </div>
    <div class="panel">
      <h1 id="title" class="title">Reader</h1>
      <p id="author" class="meta"></p>
      <div class="controls">
        <label for="progressRange">Progress</label>
        <input id="progressRange" type="range" min="0" max="100" value="0" />
        <span id="progressValue">0%</span>
        <button id="saveProgressBtn" class="primary" type="button">Save Progress</button>
        <button id="openSourceBtn" class="secondary" type="button">Open Source Link</button>
      </div>
      <p id="status" class="status"></p>
      <iframe id="readerFrame" title="Book Reader"></iframe>
    </div>
  </div>
  <script>
    const API_BASE = window.location.origin;
    const ACTIVE_BOOK_KEY = "activeBook";
    const RECENT_BOOKS_KEY = "recentBooks";

    function getActiveBook() {
      const raw = localStorage.getItem(ACTIVE_BOOK_KEY);
      return raw ? JSON.parse(raw) : null;
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function updateLocalProgress(book, progress) {
      const recentRaw = localStorage.getItem(RECENT_BOOKS_KEY);
      const recent = recentRaw ? JSON.parse(recentRaw) : [];
      const key = book._id || book.externalId || book.fileUrl || book.title;
      const updated = recent.map((b) => {
        const bKey = b._id || b.externalId || b.fileUrl || b.title;
        return bKey === key ? { ...b, progress, lastOpenedAt: Date.now() } : b;
      });
      localStorage.setItem(RECENT_BOOKS_KEY, JSON.stringify(updated));
      localStorage.setItem(ACTIVE_BOOK_KEY, JSON.stringify({ ...book, progress, lastOpenedAt: Date.now() }));
    }

    async function loadServerProgress(book) {
      const token = localStorage.getItem("token");
      if (!token || !book._id) return book.progress || 0;
      try {
        const res = await fetch(`${API_BASE}/api/users/progress/${book._id}`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) return book.progress || 0;
        const data = await res.json();
        return typeof data.progress === "number" ? data.progress : 0;
      } catch {
        return book.progress || 0;
      }
    }

    async function saveServerProgress(book, progress) {
      const token = localStorage.getItem("token");
      if (!token || !book._id) return false;
      try {
        const res = await fetch(`${API_BASE}/api/users/progress`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ bookId: book._id, progress })
        });
        return res.ok;
      } catch {
        return false;
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const book = getActiveBook();
      if (!book) {
        setText("title", "No active book");
        setText("status", "Open a book from library first.");
        return;
      }
      setText("title", book.title || "Untitled");
      setText("author", `Author: ${book.author || "Unknown Author"}`);
      document.getElementById("readerFrame").src = book.fileUrl && book.fileUrl !== "#" ? book.fileUrl : "about:blank";

      const range = document.getElementById("progressRange");
      const value = document.getElementById("progressValue");
      const saved = await loadServerProgress(book);
      range.value = String(saved);
      value.textContent = `${saved}%`;

      range.addEventListener("input", () => {
        value.textContent = `${range.value}%`;
      });

      document.getElementById("saveProgressBtn").addEventListener("click", async () => {
        const progress = Number(range.value);
        updateLocalProgress(book, progress);
        const ok = await saveServerProgress(book, progress);
        const now = new Date().toLocaleString();
        setText("lastSaved", `Last saved: ${now}`);
        setText("status", ok ? "Progress saved to account and local state." : "Progress saved locally.");
      });

      document.getElementById("openSourceBtn").addEventListener("click", () => {
        if (!book.fileUrl || book.fileUrl === "#") {
          setText("status", "This book has no source URL.");
          return;
        }
        window.open(book.fileUrl, "_blank");
      });
    });
  </script>
</body>
</html>
