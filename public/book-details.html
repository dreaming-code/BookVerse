<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Details</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
      background: #111827;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .top-bar a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 600;
    }
    .details {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 20px;
    }
    .cover {
      width: 220px;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
      background: #1f2937;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .meta {
      color: #93c5fd;
      margin-bottom: 10px;
    }
    .description {
      line-height: 1.6;
      color: #cbd5e1;
      margin-bottom: 18px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .primary {
      background: #0284c7;
      color: #fff;
    }
    .secondary {
      background: #374151;
      color: #fff;
    }
    .resume {
      margin-top: 16px;
      color: #86efac;
    }
    @media (max-width: 760px) {
      .details {
        grid-template-columns: 1fr;
      }
      .cover {
        width: 100%;
        max-width: 260px;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <a href="library.html">← Back to Library</a>
      <span id="sourceText"></span>
    </div>

    <div class="details">
      <img id="cover" class="cover" alt="Book cover" />
      <div>
        <h1 id="title">Untitled</h1>
        <div id="author" class="meta"></div>
        <div id="genre" class="meta"></div>
        <p id="description" class="description">No description available.</p>
        <div class="actions">
          <button id="startBtn" class="primary" type="button">Start / Resume Reading</button>
          <button id="stashBtn" class="secondary" type="button">Add to Continue Reading</button>
          <button id="likeBtn" class="secondary" type="button">♡ Like</button>
        </div>
        <p id="resumeText" class="resume"></p>
      </div>
    </div>
  </div>

  <script src="bookDetails.js"></script>
</body>
</html>
